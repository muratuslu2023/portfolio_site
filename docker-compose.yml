services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=portfolio
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass

  backend:
    build: ./backend # Points to your Django Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app # Mounts code for instant updates (Dev mode)
      - static_volume:/app/staticfiles
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/portfolio
      - PYTHONUNBUFFERED=1 
    depends_on:
      - db

  frontend:
    #user: "${UID}:${GID}"
    build: ./frontend # Points to your React Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume:
